{% extends "base.html" %}
{% block title %}{{ album_title }} - Simple Music Tracker{% endblock %}

{% block content %}
<p><a href="{{ back_url }}">&larr; {{ back_label }}</a></p>

<div class="artist-header" id="album-header">
  <div class="artist-meta">
    <h1>{{ album_title }}</h1>
    <p class="muted" id="album-artist">{{ album_artist }}</p>
    <p class="muted" id="album-links"></p>
  </div>
</div>

<h2>Tracks <span class="muted" id="album-source"></span></h2>
<div id="album-tracks">
  <p class="muted">Loading...</p>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.ALBUM = {
    artist: {{ album_artist | tojson }},
    title: {{ album_title | tojson }},
    mbid: {{ album_mbid | tojson }}
  };
</script>
<script src="{{ url_for('static', filename='album.js') }}"></script>
{% endblock %}
