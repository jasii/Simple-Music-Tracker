{% extends "base.html" %}
{% block title %}Discover - Simple Music Tracker{% endblock %}

{% block content %}
<h1>Discover</h1>
<p class="muted">Find new music to track that may not be in your library yet.</p>

<div class="discover-controls">
  <div class="tabs" id="view-toggle">
    <button data-view="agenda" class="on">Agenda</button>
    <button data-view="calendar">Calendar</button>
  </div>
  <div id="source-filters" class="source-filters"></div>
  <button id="discover-refresh" type="button">Refresh all</button>
</div>
<p class="muted" id="discover-status"></p>

<div id="agenda-view">
  <div id="agenda-list" class="agenda">
    <p class="muted">Loading...</p>
  </div>
</div>

<div id="calendar-view" hidden>
  <div class="cal-header">
    <button id="cal-prev" type="button" title="Previous month">&larr;</button>
    <span id="cal-title" class="cal-title"></span>
    <button id="cal-next" type="button" title="Next month">&rarr;</button>
    <button id="cal-today" type="button">Today</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='relview.js') }}"></script>
<script src="{{ url_for('static', filename='discover.js') }}"></script>
{% endblock %}
