<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>{% block title %}Simple Music Tracker{% endblock %}</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // Apply the saved theme before paint to avoid a flash.
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">Simple Music Tracker</a>
    <nav class="nav">
      <a href="{{ url_for('index') }}" class="{{ 'on' if active == 'artists' }}">Artists</a>
      <a href="{{ url_for('subscriptions_page') }}" class="{{ 'on' if active == 'subscriptions' }}">Following</a>
      <a href="{{ url_for('upcoming_page') }}" class="{{ 'on' if active == 'upcoming' }}">Upcoming</a>
      <a href="{{ url_for('ignored_page') }}" class="{{ 'on' if active == 'ignored' }}">Ignored</a>
      <a href="{{ url_for('settings_page') }}" class="{{ 'on' if active == 'settings' }}">Settings</a>
      <button id="theme-toggle" type="button" class="theme-toggle" title="Toggle theme">theme</button>
    </nav>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Simple Music Tracker</span>
    <span class="sep">/</span>
    <a href="/api/upcoming?window=week">API</a>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
