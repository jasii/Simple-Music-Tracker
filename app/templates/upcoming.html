{% extends "base.html" %}
{% block title %}Upcoming - Simple Music Tracker{% endblock %}

{% block content %}
<h1>Upcoming Releases</h1>
<p class="muted">New and upcoming albums from artists you follow.</p>

<div class="tabs" id="window-tabs">
  {% for tab in upcoming_tabs %}
  <button data-window="{{ tab.key }}" class="{{ 'on' if loop.first }}">{{ tab.label }}</button>
  {% endfor %}
</div>

<div id="upcoming-list" class="release-list">
  <p class="muted">Loading...</p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='upcoming.js') }}"></script>
{% endblock %}
