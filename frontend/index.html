<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Simple Music Tracker</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <script>
      // Apply the saved color mode before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("chakra-ui-color-mode") || localStorage.getItem("theme");
          if (saved) document.documentElement.classList.toggle("dark", saved === "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
